<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DFG 大富豪 — プレイ（ローカル対戦）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  /* ===== デザインボードのトークン（DFG_UI_Design より） ===== */
  :root{
    --pine:#0b1f18; --pine-deep:#08170f; --felt:#1b4b3b; --felt-lit:#206b53;
    --gold:#dcb24f; --gold-hi:#eec766; --gold-lo:#d3a13c; --gold-ink:#20130a;
    --cream:#f6efdd; --card-face-1:#fdf8ec; --card-face-2:#efe2c4;
    --ink:#1c2b25; --red:#c0394a;
    --text:#f3ecd8; --text-soft:#b9cabf; --text-mute:#8fa79b; --text-faint:#7f978b;
    --line:rgba(255,255,255,.08); --gold-line:rgba(220,178,79,.3);
    --font-serif:'Instrument Serif',serif;
    --font-ui:'Manrope',-apple-system,'Hiragino Kaku Gothic ProN',sans-serif;
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-6:24px;
    --dur:220ms; --ease:cubic-bezier(.2,.8,.2,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font-ui); color:var(--text);
    background:
      radial-gradient(90% 60% at 15% 0%, #123a2d 0%, rgba(18,58,45,0) 55%),
      radial-gradient(80% 60% at 100% 100%, #1a2f13 0%, rgba(26,47,19,0) 60%),
      var(--pine);
    background-attachment:fixed;
    display:flex; justify-content:center;
  }
  /* スマホ基準。PCでは中央に1台ぶんを立てる */
  #app{
    position:relative; width:100%; max-width:440px; min-height:100vh;
    background:radial-gradient(120% 70% at 50% 6%, var(--felt-lit) 0%, #123a2d 40%, var(--pine) 100%);
    overflow:hidden; display:flex; flex-direction:column;
  }
  ::-webkit-scrollbar{width:0;height:0;}

  /* ===== 上部ステータス ===== */
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:var(--sp-4) var(--sp-6) 0; font-size:12px; color:var(--text-soft); font-weight:600;
  }
  .topbar .turn{color:var(--gold);}
  .headline{
    text-align:center; padding:var(--sp-4) var(--sp-6) 0;
  }
  .headline .who{font-family:var(--font-serif); font-size:30px; line-height:1;}
  .headline .sub{color:var(--text-mute); font-size:12px; margin-top:4px;}

  /* ルールチップ（状態を空気で見せる） */
  .chips{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:var(--sp-4); min-height:24px; padding:0 var(--sp-4);}
  .chip{background:rgba(220,178,79,.16); color:var(--gold); font-size:11px; font-weight:700; padding:5px 10px; border-radius:9px;}
  .chip.mute{background:rgba(255,255,255,.06); color:var(--text-mute);}

  /* ===== 場（テーブル中央） ===== */
  .field-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-3); padding:var(--sp-4);}
  .field-label{color:var(--text-soft); font-size:11px; letter-spacing:.18em; text-transform:uppercase;}
  .field{display:flex; justify-content:center; align-items:center; gap:8px; min-height:96px;}
  .field .empty{color:var(--text-faint); font-size:13px;}

  /* ===== カード ===== */
  .card{
    border-radius:10px;
    background:linear-gradient(160deg, var(--card-face-1), var(--card-face-2));
    box-shadow:0 8px 18px -6px rgba(0,0,0,.5);
    color:var(--ink); position:relative; flex:0 0 auto;
    font-family:var(--font-ui); font-weight:800; user-select:none;
  }
  .card.red{color:var(--red);}
  .card .idx{position:absolute; top:5px; left:7px; line-height:.98;}
  .card .idx .r{font-size:1.05em;}
  .card .idx .s{font-size:.8em;}
  .card .big{position:absolute; inset:0; display:grid; place-items:center; font-size:1.5em; opacity:.85;}
  .card.jk .jk-label{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--font-serif); color:var(--gold-lo); font-size:.9em; letter-spacing:.06em;}

  /* 場札サイズ */
  .field .card{width:60px; height:86px; font-size:15px;}
  .field .card:nth-child(odd){transform:rotate(-5deg);}
  .field .card:nth-child(even){transform:rotate(5deg);}

  /* ===== 手札（扇形） ===== */
  .hand-area{position:relative; height:210px;}
  .selinfo{position:absolute; top:6px; left:0; right:0; text-align:center; color:var(--text-mute); font-size:12px;}
  .selinfo b{color:var(--gold);}
  .hand{position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:100%; height:180px;}
  .hand .card{
    position:absolute; bottom:0; width:62px; height:88px; font-size:14px;
    transform-origin:bottom center; cursor:pointer;
    transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), filter var(--dur) var(--ease);
  }
  .hand .card:focus-visible{outline:2px solid var(--gold-hi); outline-offset:2px;}
  .hand .card.selected{
    box-shadow:0 14px 28px -6px rgba(220,178,79,.6); outline:2px solid var(--gold);
    z-index:60 !important;
  }

  /* ===== アクションバー ===== */
  .actions{display:flex; gap:12px; padding:var(--sp-4); padding-bottom:calc(var(--sp-4) + env(safe-area-inset-bottom));}
  .btn{border:none; font-family:var(--font-ui); font-weight:800; font-size:16px; padding:16px; border-radius:15px; cursor:pointer; transition:transform 120ms var(--ease), filter 120ms var(--ease);}
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn.pass{flex:1; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); color:var(--text);}
  .btn.play{flex:2; background:linear-gradient(180deg,var(--gold-hi),var(--gold-lo)); color:var(--gold-ink); box-shadow:0 14px 28px -12px rgba(220,178,79,.7);}
  .btn.play:disabled{background:rgba(255,255,255,.06); color:var(--text-faint); box-shadow:none; cursor:default;}

  /* ===== オーバーレイ（開始 / 手番の受け渡し / 結果 / トースト） ===== */
  .overlay{position:absolute; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-6); padding:var(--sp-6); text-align:center;
    background:radial-gradient(100% 60% at 50% 20%, rgba(30,84,67,.7), rgba(8,23,15,.96));
    backdrop-filter:blur(3px);}
  .overlay.hidden{display:none;}
  .overlay .kicker{color:var(--gold); letter-spacing:.3em; font-size:11px; font-weight:700; text-transform:uppercase;}
  .overlay h1{font-family:var(--font-serif); font-weight:400; font-size:52px; margin:0; line-height:1;}
  .overlay p{color:var(--text-soft); font-size:14px; margin:0; max-width:280px; line-height:1.6;}
  .count-pick{display:flex; gap:10px;}
  .count-pick button{width:52px; height:52px; border-radius:14px; border:1px solid var(--gold-line); background:rgba(255,255,255,.05); color:var(--text); font-family:var(--font-serif); font-size:24px; cursor:pointer;}
  .count-pick button.on{background:linear-gradient(160deg,var(--gold-hi),var(--gold-lo)); color:var(--gold-ink); border-color:transparent;}
  .cta{background:linear-gradient(180deg,var(--gold-hi),var(--gold-lo)); color:var(--gold-ink); font-weight:800; font-size:17px; padding:16px 40px; border-radius:16px; border:none; cursor:pointer; box-shadow:0 16px 34px -12px rgba(220,178,79,.7);}
  .ghost-cta{background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); color:var(--text); font-weight:700; font-size:14px; padding:13px 26px; border-radius:14px; cursor:pointer;}

  /* 結果リスト */
  .result-list{width:100%; max-width:300px; display:flex; flex-direction:column; gap:8px;}
  .result-row{display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.05); border-radius:13px; padding:11px 15px;}
  .result-row .rank{font-family:var(--font-serif); font-size:20px; color:var(--text-mute); width:22px;}
  .result-row .nm{flex:1; text-align:left; font-weight:700; font-size:15px;}
  .result-row .title{font-size:12px; color:var(--text-soft);}
  .result-row.top{background:rgba(220,178,79,.16); border:1px solid var(--gold-line);}
  .result-row.top .rank,.result-row.top .title{color:var(--gold);}
  .result-row.bottom{background:rgba(192,57,74,.14); border:1px solid rgba(192,57,74,.35);}
  .result-row.bottom .rank,.result-row.bottom .title{color:#e08795;}

  /* トースト（エンジンの「出せません」等をそのまま見せる） */
  .toast{position:absolute; left:50%; bottom:110px; transform:translateX(-50%) translateY(10px);
    background:rgba(7,19,14,.92); border:1px solid rgba(192,57,74,.5); color:#ffd9df; font-size:13px; font-weight:700;
    padding:10px 16px; border-radius:12px; opacity:0; pointer-events:none; transition:opacity var(--dur), transform var(--dur); z-index:150; max-width:80%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){*{transition-duration:1ms !important;}}
</style>
</head>
<body>
<div id="app">
  <!-- プレイ画面 -->
  <div class="topbar">
    <span>DFG 大富豪</span>
    <span class="turn" id="tbTurn">—</span>
    <span id="tbRemain">—</span>
  </div>
  <div class="headline">
    <div class="who" id="whoTurn">—</div>
    <div class="sub" id="subTurn">手札から出すカードを選ぶ</div>
  </div>
  <div class="chips" id="chips"></div>

  <div class="field-wrap">
    <div class="field-label">場</div>
    <div class="field" id="field"><span class="empty">場は流れています</span></div>
  </div>

  <div class="hand-area">
    <div class="selinfo" id="selinfo"></div>
    <div class="hand" id="hand"></div>
  </div>

  <div class="actions">
    <button class="btn pass" id="passBtn">パス</button>
    <button class="btn play" id="playBtn" disabled>出す</button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 開始オーバーレイ -->
  <div class="overlay" id="startOverlay">
    <div class="kicker">Party Card Game · Local</div>
    <h1>DFG <span style="font-style:italic;color:var(--gold);">大富豪</span></h1>
    <p>1台で回すパス&プレイ版。人数を選んで、順番に手札を見て出していきます。</p>
    <div>
      <div style="color:var(--text-mute);font-size:12px;margin-bottom:10px;">人数</div>
      <div class="count-pick" id="countPick"></div>
    </div>
    <button class="cta" id="startBtn">配って始める</button>
  </div>

  <!-- 手番受け渡しオーバーレイ（前の人の手札を隠す） -->
  <div class="overlay hidden" id="handoffOverlay">
    <div class="kicker">Pass &amp; Play</div>
    <h1 id="handoffName">—</h1>
    <p>他の人に手札が見えないよう、本人がタップしてから続けてください。</p>
    <button class="cta" id="handoffBtn">手札を見る</button>
  </div>

  <!-- 結果オーバーレイ -->
  <div class="overlay hidden" id="resultOverlay">
    <div class="kicker">Game Over</div>
    <h1>結果発表</h1>
    <div class="result-list" id="resultList"></div>
    <div style="display:flex;gap:12px;">
      <button class="ghost-cta" id="changeCountBtn">人数を変える</button>
      <button class="cta" id="againBtn">もう一度</button>
    </div>
  </div>
</div>

<script type="module">
  // 実エンジン（りゅうせい作）をそのまま利用。UI側は state を読んで描くだけ。
  import { createDeck, shuffleDeck, dealCards, sortHand } from './card.js';
  import { createGameState, playGroup, passTurn, isGameOver } from './game.js';

  // ---- カード表示のためのヘルパ ----
  const SUIT_SYMBOL = { spade:'♠', heart:'♥', diamond:'♦', club:'♣' };
  const RED_SUITS = new Set(['heart','diamond']);
  function rankLabel(rank){
    if (rank === 1)  return 'A';
    if (rank === 11) return 'J';
    if (rank === 12) return 'Q';
    if (rank === 13) return 'K';
    return String(rank); // 2〜10 はそのまま
  }
  // カードのDOMを作る（場でも手札でも共通）
  function cardEl(card){
    const el = document.createElement('div');
    if (card.suit === 'joker'){
      el.className = 'card jk';
      el.innerHTML = `<div class="jk-label">JOKER</div>`;
      return el;
    }
    el.className = 'card' + (RED_SUITS.has(card.suit) ? ' red' : '');
    const r = rankLabel(card.rank), s = SUIT_SYMBOL[card.suit];
    el.innerHTML = `<div class="idx"><div class="r">${r}</div><div class="s">${s}</div></div><div class="big">${s}</div>`;
    return el;
  }

  // ---- 状態 ----
  let state = null;
  let playerCount = 4;
  let selected = [];            // 選択中カードの参照配列
  const names = i => `プレイヤー${i + 1}`;

  const $ = id => document.getElementById(id);

  // ---- 開始（人数選択 → 配る） ----
  function buildCountPick(){
    const wrap = $('countPick'); wrap.innerHTML = '';
    [3,4,5,6].forEach(n => {
      const b = document.createElement('button');
      b.textContent = n;
      if (n === playerCount) b.classList.add('on');
      b.onclick = () => { playerCount = n; buildCountPick(); };
      wrap.appendChild(b);
    });
  }
  function deal(){
    const deck = shuffleDeck(createDeck());
    const hands = dealCards(deck, playerCount).map(h => sortHand(h)); // 配って各手札をソート
    state = createGameState(hands);
    selected = [];
    hideAll();
    render();
    // 最初の人にも受け渡しオーバーレイを見せる（誰の手札か明示）
    showHandoff();
  }

  // ---- 描画 ----
  function render(){
    const turn = state.turn;
    // 上部
    $('tbTurn').textContent = names(turn) + ' の番';
    const remaining = state.hands.length - state.finished.length;
    $('tbRemain').textContent = `残り${remaining}人`;
    $('whoTurn').textContent = names(turn);
    $('subTurn').textContent = state.field ? '場より強い組を出す（またはパス）' : '好きな組を出せる（場が流れています）';

    // ルールチップ（状態を空気で見せる）
    const chips = $('chips'); chips.innerHTML = '';
    const addChip = (t, mute=false) => { const c=document.createElement('span'); c.className='chip'+(mute?' mute':''); c.textContent=t; chips.appendChild(c); };
    if (state.revolution) addChip('革命中');
    if (state.suitLock) addChip('しばり ' + (SUIT_SYMBOL[state.suitLock] || state.suitLock));
    if (state.sequenceLock) addChip('階段しばり');
    if (state.elevenEffect === 'back') addChip('11バック');
    if (state.sandstormLock) addChip('砂嵐');

    // 場
    const field = $('field'); field.innerHTML = '';
    if (state.field && state.field.length){
      state.field.forEach(c => field.appendChild(cardEl(c)));
    } else {
      field.innerHTML = '<span class="empty">場は流れています</span>';
    }

    // 手札（現在の手番プレイヤー）を扇形に
    renderHand(state.hands[turn]);
    updateActions();
  }

  function renderHand(hand){
    const el = $('hand'); el.innerHTML = '';
    const n = hand.length;
    const center = (n - 1) / 2;
    const spread = Math.min(6, 44 / Math.max(n,1)); // 枚数が多いほど角度を詰める
    hand.forEach((card, i) => {
      const c = cardEl(card);
      c.classList.add('hand-card');
      c.tabIndex = 0;
      const off = i - center;
      // 下端を軸に扇状：中央から外へ回転＋端ほど少し下がる弧
      const rot = off * spread;
      const arc = Math.pow(Math.abs(off), 1.2) * 4;
      const xstep = Math.min(30, 300 / Math.max(n,1)); // 重なり幅
      const x = off * xstep;
      const base = `translateX(calc(-50% + ${x}px)) translateY(${arc}px) rotate(${rot}deg)`;
      c.dataset.base = base;
      c.style.left = '50%';
      c.style.transform = base;
      c.style.zIndex = i;
      const isSel = selected.includes(card);
      if (isSel){ c.classList.add('selected'); c.style.transform = `translateX(calc(-50% + ${x}px)) translateY(-26px) rotate(0deg)`; }
      const toggle = () => {
        const at = selected.indexOf(card);
        if (at >= 0) selected.splice(at,1); else selected.push(card);
        renderHand(hand); updateActions();
      };
      c.addEventListener('click', toggle);
      c.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); }});
      el.appendChild(c);
    });
  }

  function updateActions(){
    const n = selected.length;
    $('selinfo').innerHTML = n ? `選択中 <b>${n}枚</b>` : '';
    $('playBtn').textContent = n ? `出す（${n}枚）` : '出す';
    $('playBtn').disabled = n === 0;
  }

  // ---- 手を出す ----
  $('playBtn').addEventListener('click', () => {
    if (!selected.length) return;
    const turnBefore = state.turn;
    // 選択を手札の並び順にそろえてから渡す
    const cards = state.hands[turnBefore].filter(c => selected.includes(c));
    try {
      playGroup(state, turnBefore, cards); // 無効手はここで例外。ルール判定はエンジンに任せる
    } catch (e) {
      toast(e.message); // 「階段縛りにより…」等をそのまま表示
      return;
    }
    selected = [];
    afterAction(turnBefore);
  });

  // ---- パス ----
  $('passBtn').addEventListener('click', () => {
    const turnBefore = state.turn;
    selected = [];
    passTurn(state);
    afterAction(turnBefore);
  });

  // 手が解決したあとの共通処理
  function afterAction(turnBefore){
    if (isGameOver(state)){ render(); showResult(); return; }
    render();
    // 手番が別の人に移ったら受け渡し画面を挟む（8切り等で同じ人なら挟まない）
    if (state.turn !== turnBefore) showHandoff();
  }

  // ---- オーバーレイ制御 ----
  function hideAll(){ ['startOverlay','handoffOverlay','resultOverlay'].forEach(id => $(id).classList.add('hidden')); }
  function showHandoff(){
    $('handoffName').textContent = names(state.turn);
    $('handoffOverlay').classList.remove('hidden');
  }
  $('handoffBtn').addEventListener('click', () => $('handoffOverlay').classList.add('hidden'));

  function showResult(){
    // finished = 上がった順。最後まで残った1人は大貧民。
    const order = [...state.finished];
    const remaining = state.hands.map((_,i)=>i).filter(i => !order.includes(i));
    const full = [...order, ...remaining];      // 1位 → 最下位
    const titles = titleSet(full.length);
    const list = $('resultList'); list.innerHTML = '';
    full.forEach((pi, idx) => {
      const row = document.createElement('div');
      row.className = 'result-row' + (idx===0?' top':'') + (idx===full.length-1?' bottom':'');
      row.innerHTML = `<span class="rank">${idx+1}</span><span class="nm">${names(pi)}</span><span class="title">${titles[idx]}</span>`;
      list.appendChild(row);
    });
    $('resultOverlay').classList.remove('hidden');
  }
  // 人数に応じた称号（大富豪〜大貧民）
  function titleSet(n){
    if (n <= 2) return ['勝ち','負け'];
    const t = new Array(n).fill('平民');
    t[0]='大富豪'; t[1]='富豪'; t[n-2]='貧民'; t[n-1]='大貧民';
    return t;
  }

  $('startBtn').addEventListener('click', deal);
  $('againBtn').addEventListener('click', deal);
  $('changeCountBtn').addEventListener('click', () => { hideAll(); $('startOverlay').classList.remove('hidden'); });

  // ---- トースト ----
  let toastTimer;
  function toast(msg){
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
  }

  // 初期化
  buildCountPick();
</script>
</body>
</html>
