<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>大富豪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e12;
    --surface: #14171d;
    --surface-2: #1c2028;
    --surface-3: #262b35;
    --border: #2a2f3a;
    --text: #eef1f5;
    --text-muted: #838b9a;
    --text-faint: #565d6b;
    --accent: #e8b84b;
    --accent-soft: rgba(232, 184, 75, 0.14);
    --red: #e8636b;
    --danger: #ff6b6b;
    --radius-sm: 6px;
    --radius: 12px;
    --radius-lg: 18px;
    --font-ui: 'Zen Kaku Gothic New', -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* ---------- 上部ステータスバー ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(12, 14, 18, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
  }

  .titlebar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.4rem;
  }

  .titlebar h1 {
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.02em;
    margin: 0;
  }

  .titlebar .turn-info {
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .turn-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    min-height: 22px;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 3px 8px;
    border-radius: 100px;
    background: var(--surface-3);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .badge.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: rgba(232, 184, 75, 0.35);
  }

  .badge.danger-active {
    background: rgba(255, 107, 107, 0.14);
    color: var(--danger);
    border-color: rgba(255, 107, 107, 0.35);
  }

  /* ---------- セットアップ ---------- */
  .setup-panel {
    max-width: 420px;
    margin: 3rem auto;
    padding: 1.75rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    text-align: center;
  }

  .setup-panel h2 {
    font-size: 1.3rem;
    font-weight: 900;
    margin: 0 0 0.3rem;
  }

  .setup-panel p {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin: 0 0 1.5rem;
    line-height: 1.6;
  }

  .player-count-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .count-btn {
    padding: 0.7rem 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
  }

  .count-btn.selected {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .primary-btn {
    width: 100%;
    padding: 0.85rem;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: #171200;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }
  .primary-btn:active { transform: scale(0.98); }

  /* ---------- メイン ---------- */
  main {
    flex: 1;
    display: none;
    flex-direction: column;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding-bottom: 200px;
  }
  main.visible { display: flex; }

  .players-row {
    display: flex;
    gap: 6px;
    padding: 0.6rem 1rem 0;
    overflow-x: auto;
  }

  .player-chip {
    flex: none;
    padding: 5px 10px;
    border-radius: 100px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .player-chip.current {
    background: var(--accent-soft);
    border-color: rgba(232, 184, 75, 0.4);
    color: var(--accent);
  }
  .player-chip.done {
    color: var(--text-faint);
    opacity: 0.6;
  }
  .player-chip .rank-tag {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    opacity: 0.8;
  }

  .field-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 30vh;
    padding: 1.5rem 1rem;
    gap: 0.6rem;
  }

  .field-label {
    font-size: 0.7rem;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }

  .field-cards {
    display: flex;
    gap: 8px;
    min-height: 84px;
    align-items: center;
    justify-content: center;
  }

  .field-empty {
    font-size: 0.82rem;
    color: var(--text-faint);
  }

  .field-type-tag {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .status-line {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    padding: 0 1rem;
  }
  .status-line strong { color: var(--text); font-weight: 700; }

  /* ---------- カード ---------- */
  .card {
    width: 46px;
    height: 66px;
    border-radius: 8px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    padding: 5px 6px;
    font-family: var(--font-mono);
    flex: none;
    cursor: pointer;
    user-select: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
  }

  .card .rank {
    font-size: 0.78rem;
    font-weight: 600;
    line-height: 1;
  }

  .card .suit {
    font-size: 1.15rem;
    align-self: center;
    line-height: 1;
  }

  .card.red .rank, .card.red .suit { color: var(--red); }
  .card.black .rank, .card.black .suit { color: var(--text); }
  .card.joker { align-items: center; justify-content: center; }
  .card.joker .rank { font-size: 0.62rem; letter-spacing: 0.03em; color: var(--accent); }

  .card.field-card {
    width: 54px;
    height: 78px;
    cursor: default;
  }

  .card.disabled {
    opacity: 0.32;
    cursor: default;
  }

  .card.selected {
    border-color: var(--accent);
    transform: translateY(-12px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.4), 0 0 0 1px var(--accent);
  }

  /* ---------- 手札トレイ (自分の手番) ---------- */
  .hand-tray {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 20;
    background: linear-gradient(to top, rgba(12,14,18,1) 60%, rgba(12,14,18,0.85));
    border-top: 1px solid var(--border);
    padding: 0.9rem 0 calc(0.9rem + env(safe-area-inset-bottom));
  }

  .hand-scroll {
    display: flex;
    overflow-x: auto;
    padding: 6px 16px 4px;
    gap: 0;
  }

  .hand-scroll .card {
    margin-left: -14px;
  }
  .hand-scroll .card:first-child { margin-left: 0; }
  .hand-scroll .card.selected { z-index: 5; }

  .other-hands {
    padding: 0.5rem 1rem 6.5rem;
  }
  .other-hand-block {
    margin-bottom: 0.6rem;
  }
  .other-hand-block .label {
    font-size: 0.7rem;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .other-hand-cardcount {
    display: flex;
    gap: 4px;
  }
  .mini-card {
    width: 16px;
    height: 22px;
    border-radius: 3px;
    background: var(--surface-3);
    border: 1px solid var(--border);
  }

  .controls-row {
    display: flex;
    gap: 8px;
    padding: 0 16px;
  }

  .action-btn {
    flex: 1;
    padding: 0.7rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
  }
  .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #171200;
  }
  .action-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--danger);
    padding: 6px 16px 0;
    min-height: 1.2em;
  }

  /* ---------- ペンディング(役の追加選択)ボトムシート ---------- */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 29;
    display: none;
  }
  .sheet-backdrop.visible { display: block; }

  .sheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 30;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 1.2rem 1rem calc(1.2rem + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.22s ease;
    max-height: 70vh;
    overflow-y: auto;
  }
  .sheet.visible { transform: translateY(0); }

  .sheet h3 {
    font-size: 0.92rem;
    font-weight: 700;
    margin: 0 0 0.9rem;
  }

  .sheet .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .pill-btn {
    padding: 8px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .pill-btn.selected {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .choice-row {
    display: flex;
    gap: 8px;
  }
  .choice-row .action-btn { flex: 1; }

  .count-label {
    font-size: 0.75rem;
    color: var(--text-faint);
    margin-bottom: 0.6rem;
  }

  /* ---------- ゲーム終了 ---------- */
  .result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,9,12,0.9);
    z-index: 40;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .result-overlay.visible { display: flex; }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.5rem;
    max-width: 340px;
    width: 100%;
    text-align: center;
  }
  .result-card h2 {
    font-size: 1.2rem;
    font-weight: 900;
    margin: 0 0 1rem;
  }
  .result-list {
    list-style: none;
    padding: 0;
    margin: 0 0 1.4rem;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--text-muted);
    text-align: left;
  }
  .result-list li {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .result-list li:last-child { border-bottom: none; }
  .result-list .rank-num { color: var(--accent); }

  @media (min-width: 640px) {
    .card { width: 52px; height: 74px; }
    .card.field-card { width: 60px; height: 86px; }
  }
</style>
</head>
<body>

  <header>
    <div class="titlebar">
      <h1>大富豪</h1>
      <div class="turn-info" id="turnInfo"></div>
    </div>
    <div class="badges" id="badges"></div>
  </header>

  <div id="setupPanel" class="setup-panel">
    <h2>プレイヤー人数</h2>
    <p>人数を選んでゲームを始めます</p>
    <div class="player-count-grid" id="playerCountGrid"></div>
    <button class="primary-btn" id="startBtn">この人数で開始</button>
  </div>

  <main id="main">
    <div class="players-row" id="playersRow"></div>

    <div class="field-area">
      <span class="field-label">FIELD</span>
      <div class="field-cards" id="fieldCards"></div>
      <span class="field-type-tag" id="fieldTypeTag"></span>
    </div>

    <div class="status-line" id="statusLine"></div>

    <div class="other-hands" id="otherHands"></div>
  </main>

  <div class="hand-tray" id="handTray" style="display:none;">
    <div class="hand-scroll" id="handScroll"></div>
    <div class="hint" id="hint"></div>
    <div class="controls-row">
      <button class="action-btn" id="passBtn">パス</button>
      <button class="action-btn primary" id="playBtn">出す</button>
    </div>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet"></div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <h2>ゲーム終了</h2>
      <ul class="result-list" id="resultList"></ul>
      <button class="primary-btn" id="restartBtn">もう一度遊ぶ</button>
    </div>
  </div>

  <script type="module">
    import {
      createDeck, shuffleDeck, dealCards, sortHand,
      getPlayType, getPlayStrength, getPlaySuits,
      canPlayGroup, isSpade3CounterJoker, isSandstormPlay,
    } from './card.js';
    import { createGameState, playGroup, passTurn } from './game.js';

    const SUIT_SYMBOL = { spade: '♠', heart: '♥', diamond: '♦', club: '♣', joker: '★' };
    const RANK_LABEL = { 1: 'A', 11: 'J', 12: 'Q', 13: 'K' };
    const RED_SUITS = new Set(['heart', 'diamond']);
    const TYPE_LABEL = { group: 'ペア系', straight: '階段' };

    function rankLabel(c) { return c.suit === 'joker' ? 'JOKER' : (RANK_LABEL[c.rank] || String(c.rank)); }
    function cardColorClass(c) {
      if (c.suit === 'joker') return 'joker';
      return RED_SUITS.has(c.suit) ? 'red' : 'black';
    }

    let state;
    let uiSelected = [];
    let pending = null; // { cards, needs }
    let selectedPlayerCount = 2;

    function isEffectivelyReversed() {
      return state.revolution !== (state.elevenEffect === 'back');
    }

    function cardKey(c) { return c.suit + '-' + c.rank + '-' + c._uid; }

    // ---------- セットアップ画面 ----------
    const countGrid = document.getElementById('playerCountGrid');
    [2, 3, 4, 5].forEach((n) => {
      const btn = document.createElement('button');
      btn.className = 'count-btn' + (n === selectedPlayerCount ? ' selected' : '');
      btn.textContent = n + '人';
      btn.onclick = () => {
        selectedPlayerCount = n;
        [...countGrid.children].forEach((c) => c.classList.remove('selected'));
        btn.classList.add('selected');
      };
      countGrid.appendChild(btn);
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('setupPanel').style.display = 'none';
      document.getElementById('main').classList.add('visible');
      document.getElementById('handTray').style.display = 'block';
      newGame(selectedPlayerCount);
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      document.getElementById('resultOverlay').classList.remove('visible');
      newGame(selectedPlayerCount);
    });

    function newGame(playerCount) {
      const deck = shuffleDeck(createDeck());
      const hands = dealCards(deck, playerCount).map((h) => sortHand(h));
      state = createGameState(hands);
      uiSelected = [];
      pending = null;
      closeSheet();
      render();
    }

    // ---------- カード生成 ----------
    function makeCardEl(c, { selected = false, disabled = false, fieldStyle = false, onClick = null } = {}) {
      if (c._uid === undefined) c._uid = Math.random().toString(36).slice(2, 8);
      const el = document.createElement('button');
      el.className = 'card ' + cardColorClass(c) + (fieldStyle ? ' field-card' : '') + (selected ? ' selected' : '') + (disabled ? ' disabled' : '');
      if (c.suit === 'joker') {
        const rank = document.createElement('span'); rank.className = 'rank'; rank.textContent = 'JOKER';
        el.appendChild(rank);
      } else {
        const rank = document.createElement('span'); rank.className = 'rank'; rank.textContent = rankLabel(c);
        const suit = document.createElement('span'); suit.className = 'suit'; suit.textContent = SUIT_SYMBOL[c.suit];
        el.appendChild(rank);
        el.appendChild(suit);
      }
      el.disabled = disabled;
      if (onClick) el.addEventListener('click', onClick);
      return el;
    }

    // ---------- 選択 ----------
    function toggleSelect(pIdx, card) {
      if (pending) return;
      if (state.turn !== pIdx || state.finished.length >= state.hands.length - 1) return;
      const key = cardKey(card);
      const i = uiSelected.indexOf(key);
      if (i >= 0) uiSelected.splice(i, 1);
      else uiSelected.push(key);
      render();
    }

    // ---------- プレイ処理 ----------
    function startPlay() {
      const pIdx = state.turn;
      const hand = state.hands[pIdx];
      const chosen = hand.filter((c) => uiSelected.includes(cardKey(c)));
      if (chosen.length === 0) return;

      const rev = isEffectivelyReversed();
      const isUniv = isSpade3CounterJoker(chosen, state.field) || isSandstormPlay(chosen);
      const allJackOrJoker = chosen.every((c) => c.suit === 'joker' || c.rank === 11);
      const isStayJack = state.elevenEffect === 'stay' && getPlayType(chosen) === 'group' && allJackOrJoker;
      const bypass = isUniv || isStayJack;

      if (!bypass && !canPlayGroup(chosen, state.field, rev)) return;
      if (state.sandstormLock && !isSandstormPlay(chosen)) return;
      if (state.elevenEffect === 'stay' && !bypass) return;
      if (state.sequenceLock && !bypass) {
        const fs = getPlayStrength(state.field, rev), ps = getPlayStrength(chosen, rev);
        if (chosen.length !== state.field.length || ps !== fs + 1) return;
      }
      const playSuits = getPlaySuits(chosen);
      if (state.suitLock && !playSuits.has(state.suitLock) && !bypass) return;

      const playType = getPlayType(chosen);
      const containsRank = (r) => chosen.some((c) => c.rank === r);
      const rep = chosen.find((c) => c.suit !== 'joker');

      let needs = null;
      if (!bypass && (playType === 'group' || playType === 'straight')) {
        const has = (r) => (playType === 'group' ? rep && rep.rank === r : containsRank(r));
        if (has(7)) needs = 'give';
        else if (has(10)) needs = 'discard';
        else if (has(12)) needs = 'declare';
        else if (has(11)) needs = 'eleven';
      }

      if (needs) {
        pending = { cards: chosen, needs };
        uiSelected = [];
        openPendingSheet();
      } else {
        finalize(chosen, {});
      }
    }

    function finalize(cards, options) {
      try {
        playGroup(state, state.turn, cards, options);
      } catch (e) {
        document.getElementById('hint').textContent = e.message;
        setTimeout(() => { document.getElementById('hint').textContent = ''; }, 2200);
        return;
      }
      pending = null;
      uiSelected = [];
      closeSheet();
      render();
    }

    function doPass() {
      passTurn(state);
      uiSelected = [];
      render();
    }

    // ---------- ボトムシート (7/10/11/12) ----------
    function openPendingSheet() {
      document.getElementById('sheetBackdrop').classList.add('visible');
      const sheet = document.getElementById('sheet');
      sheet.classList.add('visible');
      renderSheet();
    }
    function closeSheet() {
      document.getElementById('sheetBackdrop').classList.remove('visible');
      document.getElementById('sheet').classList.remove('visible');
    }

    function renderSheet() {
      const sheet = document.getElementById('sheet');
      sheet.innerHTML = '';
      if (!pending) return;

      const pIdx = state.turn;
      const hand = state.hands[pIdx];
      const playedCards = pending.cards;
      const playType = getPlayType(playedCards);
      const remainingHand = hand.filter((c) => !playedCards.some((p) => p.suit === c.suit && p.rank === c.rank));
      const maxN = playType === 'group' ? playedCards.length : 1;

      const title = document.createElement('h3');
      sheet.appendChild(title);

      if (pending.needs === 'give') {
        title.textContent = '7の効果 — 次のプレイヤーに渡すカード';
        sheet.appendChild(cardCountLabel(maxN));
        appendCardPicker(sheet, remainingHand, maxN, (picked) => finalize(pending.cards, { giveCards: picked }));
      } else if (pending.needs === 'discard') {
        title.textContent = '10の効果 — 捨てるカード';
        sheet.appendChild(cardCountLabel(maxN));
        appendCardPicker(sheet, remainingHand, maxN, (picked) => finalize(pending.cards, { discardCards: picked }));
      } else if (pending.needs === 'declare') {
        title.textContent = '12の効果 — 全員に捨てさせる数字';
        sheet.appendChild(cardCountLabel(maxN));
        appendRankPicker(sheet, maxN, (ranks) => finalize(pending.cards, { declareRanks: ranks }));
      } else if (pending.needs === 'eleven') {
        title.textContent = '11の効果を選ぶ';
        const row = document.createElement('div');
        row.className = 'choice-row';
        [['through', 'そのまま'], ['back', 'バック'], ['stay', 'ステイ']].forEach(([choice, label]) => {
          const b = document.createElement('button');
          b.className = 'action-btn';
          b.textContent = label;
          b.onclick = () => finalize(pending.cards, { elevenChoice: choice });
          row.appendChild(b);
        });
        sheet.appendChild(row);
      }
    }

    function cardCountLabel(n) {
      const el = document.createElement('div');
      el.className = 'count-label';
      el.textContent = '0〜' + n + '枚選べます';
      return el;
    }

    function appendCardPicker(sheet, hand, n, onConfirm) {
      const grid = document.createElement('div');
      grid.className = 'grid';
      const picked = [];
      const countLabel = document.createElement('div');
      countLabel.className = 'count-label';
      function updateCount() { countLabel.textContent = picked.length + ' / ' + n + ' 枚選択中'; }

      hand.forEach((c) => {
        const btn = makeCardEl(c, {
          onClick: () => {
            const idx = picked.findIndex((p) => p._uid === c._uid);
            if (idx >= 0) { picked.splice(idx, 1); btn.classList.remove('selected'); }
            else if (picked.length < n) { picked.push(c); btn.classList.add('selected'); }
            updateCount();
          },
        });
        grid.appendChild(btn);
      });
      sheet.appendChild(grid);
      updateCount();
      sheet.appendChild(countLabel);

      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'action-btn primary';
      confirmBtn.style.width = '100%';
      confirmBtn.style.marginTop = '0.8rem';
      confirmBtn.textContent = '決定';
      confirmBtn.onclick = () => onConfirm(picked);
      sheet.appendChild(confirmBtn);
    }

    function appendRankPicker(sheet, n, onConfirm) {
      const grid = document.createElement('div');
      grid.className = 'grid';
      const picked = [];
      for (let r = 1; r <= 13; r++) {
        const btn = document.createElement('button');
        btn.className = 'pill-btn';
        btn.textContent = RANK_LABEL[r] || String(r);
        btn.onclick = () => {
          const idx = picked.indexOf(r);
          if (idx >= 0) { picked.splice(idx, 1); btn.classList.remove('selected'); }
          else if (picked.length < n) { picked.push(r); btn.classList.add('selected'); }
          confirmBtn.disabled = picked.length !== n;
        };
        grid.appendChild(btn);
      }
      sheet.appendChild(grid);
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'action-btn primary';
      confirmBtn.style.width = '100%';
      confirmBtn.disabled = true;
      confirmBtn.textContent = '決定';
      confirmBtn.onclick = () => onConfirm(picked);
      sheet.appendChild(confirmBtn);
    }

    // ---------- 描画 ----------
    function render() {
      const n = state.hands.length;
      const over = state.finished.length >= n - 1;

      // タイトルバー
      document.getElementById('turnInfo').innerHTML = over
        ? ''
        : '<span class="turn-dot"></span> プレイヤー' + (state.turn + 1) + 'の番';

      // バッジ
      const badgesEl = document.getElementById('badges');
      badgesEl.innerHTML = '';
      const badgeDefs = [];
      if (state.revolution) badgeDefs.push(['danger-active', '革命']);
      if (state.elevenEffect === 'back') badgeDefs.push(['active', 'バック']);
      if (state.elevenEffect === 'stay') badgeDefs.push(['active', 'ステイ (Jのみ)']);
      if (state.sequenceLock) badgeDefs.push(['active', '階段縛り']);
      if (state.suitLock) badgeDefs.push(['active', '記号縛り ' + SUIT_SYMBOL[state.suitLock]]);
      if (state.sandstormLock) badgeDefs.push(['danger-active', '砂嵐ロック']);
      if (state.direction === -1) badgeDefs.push(['active', '↺ 逆回り']);
      badgeDefs.forEach(([cls, label]) => {
        const b = document.createElement('span');
        b.className = 'badge ' + cls;
        b.textContent = label;
        badgesEl.appendChild(b);
      });

      // プレイヤー一覧チップ
      const playersRow = document.getElementById('playersRow');
      playersRow.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const chip = document.createElement('div');
        const done = state.finished.includes(i);
        const rankPos = state.finished.indexOf(i);
        chip.className = 'player-chip' + (state.turn === i && !over ? ' current' : '') + (done ? ' done' : '');
        chip.innerHTML = 'P' + (i + 1) +
          (done ? '<span class="rank-tag">' + (rankPos + 1) + '位</span>' : '<span class="rank-tag">' + state.hands[i].length + '枚</span>');
        playersRow.appendChild(chip);
      }

      // 場
      const fieldCards = document.getElementById('fieldCards');
      fieldCards.innerHTML = '';
      const fieldTypeTag = document.getElementById('fieldTypeTag');
      if (state.field) {
        state.field.forEach((c) => fieldCards.appendChild(makeCardEl(c, { disabled: true, fieldStyle: true })));
        fieldTypeTag.textContent = TYPE_LABEL[getPlayType(state.field)];
      } else {
        const span = document.createElement('span');
        span.className = 'field-empty';
        span.textContent = '場はまだ空です';
        fieldCards.appendChild(span);
        fieldTypeTag.textContent = '';
      }

      // ステータス行
      const statusLine = document.getElementById('statusLine');
      if (over) {
        statusLine.textContent = '';
      } else {
        statusLine.innerHTML = '残り <strong>' + (n - state.finished.length) + '</strong> 人プレイ中';
      }

      // 他プレイヤーの手札枚数
      const otherHands = document.getElementById('otherHands');
      otherHands.innerHTML = '';
      for (let i = 0; i < n; i++) {
        if (i === state.turn && !over) continue;
        const block = document.createElement('div');
        block.className = 'other-hand-block';
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = 'プレイヤー' + (i + 1) + (state.finished.includes(i) ? '（上がり）' : '');
        block.appendChild(label);
        const row = document.createElement('div');
        row.className = 'other-hand-cardcount';
        const count = state.finished.includes(i) ? 0 : state.hands[i].length;
        for (let k = 0; k < Math.min(count, 20); k++) {
          const mini = document.createElement('div');
          mini.className = 'mini-card';
          row.appendChild(mini);
        }
        block.appendChild(row);
        otherHands.appendChild(block);
      }

      // 自分の手札トレイ
      const handTray = document.getElementById('handTray');
      const handScroll = document.getElementById('handScroll');
      handScroll.innerHTML = '';
      if (over) {
        handTray.style.display = 'none';
      } else {
        handTray.style.display = 'block';
        const curHand = state.hands[state.turn];
        curHand.forEach((c) => {
          const selected = uiSelected.includes(cardKey(c));
          const isTurn = !pending;
          const el = makeCardEl(c, {
            selected,
            disabled: !isTurn,
            onClick: () => toggleSelect(state.turn, c),
          });
          handScroll.appendChild(el);
        });
      }

      // 出す/パスボタンの有効判定
      const curHand = state.hands[state.turn] || [];
      const chosen = curHand.filter((c) => uiSelected.includes(cardKey(c)));
      const rev = isEffectivelyReversed();
      const isUniv = isSpade3CounterJoker(chosen, state.field) || isSandstormPlay(chosen);
      const allJackOrJoker = chosen.length > 0 && chosen.every((c) => c.suit === 'joker' || c.rank === 11);
      const isStayJack = state.elevenEffect === 'stay' && getPlayType(chosen) === 'group' && allJackOrJoker;
      const bypass = isUniv || isStayJack;

      let playable = chosen.length > 0;
      if (playable) {
        if (!bypass) playable = canPlayGroup(chosen, state.field, rev);
        if (playable && state.sandstormLock && !isSandstormPlay(chosen)) playable = false;
        if (playable && state.elevenEffect === 'stay' && !bypass) playable = false;
        if (playable && state.sequenceLock && !bypass) {
          const fs = getPlayStrength(state.field, rev), ps = getPlayStrength(chosen, rev);
          playable = chosen.length === state.field.length && ps === fs + 1;
        }
        if (playable && state.suitLock && !bypass) {
          playable = getPlaySuits(chosen).has(state.suitLock);
        }
      }
      document.getElementById('playBtn').disabled = !playable || over || !!pending;
      document.getElementById('passBtn').disabled = over || !!pending;

      // 終了画面
      const resultOverlay = document.getElementById('resultOverlay');
      if (over) {
        const remaining = [...Array(n).keys()].filter((i) => !state.finished.includes(i));
        const order = [...state.finished, ...remaining];
        const list = document.getElementById('resultList');
        list.innerHTML = '';
        order.forEach((p, i) => {
          const li = document.createElement('li');
          li.innerHTML = '<span class="rank-num">' + (i + 1) + '位</span><span>プレイヤー' + (p + 1) + '</span>';
          list.appendChild(li);
        });
        resultOverlay.classList.add('visible');
      } else {
        resultOverlay.classList.remove('visible');
      }
    }

    document.getElementById('playBtn').addEventListener('click', startPlay);
    document.getElementById('passBtn').addEventListener('click', doPass);
    document.getElementById('sheetBackdrop').addEventListener('click', () => {
      // シートは決定を押さないと閉じない (誤操作防止)
    });
  </script>
</body>
</html>
